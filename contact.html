<html>
    <head>
        <title>My Website Page</title>
        <link rel="stylesheet" href="css/form.css">
    </head>
    <body>
        <header>
            <div class="container">
                <div id="branding">
                    <marquee behavior="script" scrollamount="2"
                        direction="right"><h1><span
                                class="highlight">CodeAstra</span> Web
                            design</h1></marquee>
                    <img src="./img/codeastra.jpg" alt="brand Logo">
                </div>
                <nav>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="services.html">Services</a></li>
                        <li class="current"><a
                                href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </header>
            <div class="signupBox">
                <h2>Sign up!</h2>
                <form>
                    <input type="text" placeholder="First Name" required>
                    <br><br>

                    <input type="text" placeholder="Last Name" required>
                    <br><br>

                    <input type="password" placeholder="Password" required>
                    <br><br>

                    <input type="password" placeholder="confirm password"
                        required>
                    <br><br>
                    <input type="number" placeholder="phone number" required>
                    <br><br>
                    <input type="email" placeholder="Email" required>
                    <br><br>

                    <button>Sign Up</button>
                    <br><br>

                    <div class="signIn">

                        <p>Already have an account? <a href="#">Sign In</a></p>
                    </div>

                </form>

            </div>
            <footer>
                <p>CodeAstra web design, copyright &copy; 2020</p>
            </footer>

        </body>
    </html>
